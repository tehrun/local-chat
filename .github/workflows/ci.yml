name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, openssl, curl
          coverage: none

      - name: Lint PHP syntax
        run: |
          set -euo pipefail
          find . -type f -name '*.php' \
            -not -path './storage/*' \
            -print0 | xargs -0 -n1 php -l

  tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo_sqlite, openssl, curl
          coverage: none

      - name: Run functional/unit tests
        run: php tests/run.php

  build:
    runs-on: ubuntu-latest
    needs: [lint, tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build distributable archive
        run: |
          set -euo pipefail
          mkdir -p build
          tar -czf build/local-chat.tar.gz \
            --exclude-vcs \
            --exclude='./storage/*' \
            --exclude='./build/*' \
            .
          test -s build/local-chat.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-chat-archive
          path: build/local-chat.tar.gz
